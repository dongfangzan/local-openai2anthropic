# OA2A Configuration File
# Place this file at ~/.oa2a/config.toml

# OpenAI API Configuration
openai_api_key = ""
openai_base_url = ""
openai_org_id = ""
openai_project_id = ""

# Server Configuration
host = "0.0.0.0"
port = 8080
request_timeout = 300.0

# API Key for authenticating requests to this server (optional)
api_key = ""

# CORS settings
cors_origins = ["*"]
cors_credentials = true
cors_methods = ["*"]
cors_headers = ["*"]

# Logging
log_level = "INFO"
log_dir = ""  # Empty uses platform-specific default

# Tavily Web Search Configuration
tavily_api_key = ""
tavily_timeout = 30.0
tavily_max_results = 5

# TongXiao (通晓) Web Search Configuration - 阿里云通晓统一搜索
tongxiao_api_key = ""
tongxiao_timeout = 30.0
tongxiao_max_results = 5

# Web Search Settings
websearch_max_uses = 5

# 选择搜索提供商: "tavily" | "tongxiao" | "both"
websearch_provider = "tongxiao"
